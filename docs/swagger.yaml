basePath: /
definitions:
  api.ExperimentSummary:
    properties:
      currentLevel:
        type: integer
      currentLevelCost:
        type: string
      currentLevelValue:
        type: string
      id:
        $ref: '#/definitions/models.ExperimentID'
      maxLevel:
        type: boolean
      nextLevelCost:
        type: string
      nextLevelValue:
        type: string
    type: object
  api.PlanSummary:
    properties:
      id:
        type: integer
      name:
        type: string
    type: object
  api.RecalculateResponse:
    properties:
      baseShards:
        type: integer
      experimentCost:
        type: integer
      experiments:
        additionalProperties:
          $ref: '#/definitions/api.ExperimentSummary'
        type: object
      featMultiplier:
        type: number
      legendMultiplier:
        type: number
      legendaryRunes:
        additionalProperties:
          $ref: '#/definitions/calculator.RuneCosts'
        type: object
      otherMultiplier:
        type: number
      remaining:
        type: integer
      runeNeeded:
        additionalProperties:
          type: integer
        type: object
      runeTotal:
        additionalProperties:
          type: integer
        type: object
      totalShards:
        type: integer
    type: object
  api.RelicLevels:
    properties:
      allResources:
        type: integer
      darkness:
        type: integer
      mana:
        type: integer
      slime:
        type: integer
    type: object
  api.ResourceCapRequest:
    properties:
      capacityExp1:
        description: CapacityExp1 is the Capacity Experiment I level (0-9).
        type: integer
      capacityExp2:
        description: CapacityExp2 is the Capacity Experiment II level (0-9).
        type: integer
      darkStores:
        $ref: '#/definitions/api.StationCounts'
      fixedTargets:
        additionalProperties:
          type: integer
        description: |-
          FixedTargets lets the player pin a specific cap goal for one resource.
          Remaining combined threshold is then split across the other two.
        type: object
      goldenBoosts:
        type: boolean
      manaPools:
        $ref: '#/definitions/api.StationCounts'
      pearlBonus:
        additionalProperties:
          format: float64
          type: number
        description: |-
          PearlBonus is the per-resource pearl % bonus as shown in game statistics
          (already includes the all-resources pearl contribution).
        type: object
      relics:
        $ref: '#/definitions/api.RelicLevels'
      servO:
        $ref: '#/definitions/api.ServOConfig'
      skins:
        $ref: '#/definitions/api.ResourceSkins'
      slimeVats:
        $ref: '#/definitions/api.StationCounts'
      spells:
        $ref: '#/definitions/api.SpellLevels'
    type: object
  api.ResourceCapResponse:
    properties:
      combined:
        type: integer
      darkness:
        type: integer
      delta:
        description: Delta is positive when the player exceeds the threshold, negative
          when short.
        type: integer
      gapAnalysis:
        additionalProperties:
          $ref: '#/definitions/api.ResourceGapAnalysis'
        description: GapAnalysis is only present when the threshold is not met.
        type: object
      mana:
        type: integer
      met:
        type: boolean
      slime:
        type: integer
      threshold:
        type: integer
    type: object
  api.ResourceGapAnalysis:
    properties:
      current:
        type: integer
      gap:
        type: integer
      options:
        description: one entry per station level (1-6)
        items:
          $ref: '#/definitions/api.StationOption'
        type: array
      target:
        type: integer
    type: object
  api.ResourceSkins:
    properties:
      birthday:
        description: +5% Slime
        type: boolean
      good:
        description: +2% All
        type: boolean
      oozing:
        description: +2000 Slime
        type: boolean
      royalty:
        description: +5% All
        type: boolean
      santa:
        description: Multiplicative skins
        type: boolean
      sid:
        description: +2000 Darkness
        type: boolean
      witch:
        description: +5% Darkness
        type: boolean
      wizard:
        description: Base boost skins (flat cap increase)
        type: boolean
    type: object
  api.ServOConfig:
    properties:
      resource:
        $ref: '#/definitions/models.ResourceType'
      upgraded:
        type: boolean
    type: object
  api.SpellLevels:
    properties:
      allResources:
        type: integer
      darkness:
        type: integer
      mana:
        type: integer
      slime:
        type: integer
    type: object
  api.StationCounts:
    properties:
      l1:
        type: integer
      l2:
        type: integer
      l3:
        type: integer
      l4:
        type: integer
      l5:
        type: integer
      l6:
        type: integer
    type: object
  api.StationOption:
    properties:
      count:
        type: integer
      level:
        type: integer
      runeCost:
        additionalProperties:
          type: integer
        type: object
    type: object
  calculator.RuneCosts:
    additionalProperties:
      type: integer
    type: object
  models.ExperimentID:
    enum:
    - seasoning
    - strength
    - taste
    - capacity
    - body_snatcher
    - weakening
    - damage_cap
    - ice_chest
    - poison_chest
    - blood_chest
    - moon_chest
    - death_chest
    - cosmic_chest
    - seasoning_2
    - strength_2
    - taste_2
    - capacity_2
    type: string
    x-enum-varnames:
    - ExpSeasoning
    - ExpStrength
    - ExpTaste
    - ExpCapacity
    - ExpBodySnatcher
    - ExpWeakening
    - ExpDamageCap
    - ExpIceChest
    - ExpPoisonChest
    - ExpBloodChest
    - ExpMoonChest
    - ExpDeathChest
    - ExpCosmicChest
    - ExpSeasoning2
    - ExpStrength2
    - ExpTaste2
    - ExpCapacity2
  models.Plan:
    properties:
      devourerLevel:
        type: integer
      experimentLevels:
        additionalProperties:
          type: integer
        description: the planned setup of experiments
        type: object
      featTiers:
        type: integer
      groupBonusCount:
        description: Number of times group bonuses can be claimed (default 1)
        type: integer
      id:
        type: integer
      leftoverShards:
        description: Shards remaining from previous prestige
        type: integer
      legendaryCounts:
        additionalProperties:
          type: integer
        description: the planned amount of legendaries
        type: object
      name:
        type: string
      notes:
        type: string
      otherMultiplier:
        description: The "Other" category (skins, etc.)
        type: number
      possessedLegendaries:
        additionalProperties:
          type: integer
        type: object
      possessedRunes:
        additionalProperties:
          type: integer
        type: object
    type: object
  models.ResourceType:
    enum:
    - mana
    - slime
    - darkness
    type: string
    x-enum-varnames:
    - ResourceMana
    - ResourceSlime
    - ResourceDarkness
host: localhost:8085
info:
  contact: {}
  description: API for planning prestige resets and experiment spending in Necromerger
  title: Necro Prestige Planner API
  version: "1.0"
paths:
  /api/plans:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/api.PlanSummary'
            type: array
        "500":
          description: internal server error
          schema:
            type: string
      summary: List all saved plans
      tags:
      - plans
    post:
      consumes:
      - application/json
      description: Creates a new plan when id is 0 or omitted, updates an existing
        plan when id > 0
      parameters:
      - description: Plan data
        in: body
        name: plan
        required: true
        schema:
          $ref: '#/definitions/models.Plan'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Plan'
        "400":
          description: invalid request body
          schema:
            type: string
        "500":
          description: internal server error
          schema:
            type: string
      summary: Create or update a plan
      tags:
      - plans
  /api/plans/{id}:
    delete:
      parameters:
      - description: Plan ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "204":
          description: no content
          schema:
            type: string
        "400":
          description: invalid id
          schema:
            type: string
        "500":
          description: internal server error
          schema:
            type: string
      summary: Delete a plan
      tags:
      - plans
    get:
      parameters:
      - description: Plan ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Plan'
        "400":
          description: invalid id
          schema:
            type: string
        "404":
          description: plan not found
          schema:
            type: string
      summary: Get a plan by ID
      tags:
      - plans
  /api/recalculate:
    post:
      consumes:
      - application/json
      description: Given a plan, returns total Time Shards earned at prestige, experiment
        costs, rune requirements for planned legendaries, and per-experiment summaries
      parameters:
      - description: Plan to calculate
        in: body
        name: plan
        required: true
        schema:
          $ref: '#/definitions/models.Plan'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.RecalculateResponse'
        "400":
          description: invalid request body
          schema:
            type: string
      summary: Calculate Time Shards and resource costs for a plan
      tags:
      - calculator
  /api/resource-cap/{threshold}:
    post:
      consumes:
      - application/json
      description: Returns current Mana/Slime/Darkness caps, whether the requested
        Feat threshold is met, and (if not) how many stations of each level are needed
        per resource to close the gap. Percentage inputs are decimals (0.06 = 6%).
      parameters:
      - description: Combined storage threshold
        enum:
        - 200k
        - 400k
        - 600k
        - 800k
        in: path
        name: threshold
        required: true
        type: string
      - description: Player state
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.ResourceCapRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.ResourceCapResponse'
        "400":
          description: invalid threshold or request body
          schema:
            type: string
      summary: Calculate resource caps and station requirements for a Feat threshold
      tags:
      - calculator
  /health:
    get:
      produces:
      - text/plain
      responses:
        "200":
          description: OK
          schema:
            type: string
      summary: Health check
      tags:
      - system
swagger: "2.0"
