version: '3'

dotenv: ['.env']

tasks:
  setup:
    desc: Install necessary tools
    cmds:
      - go install github.com/air-verse/air@latest
      - go install github.com/swaggo/swag/cmd/swag@latest
      - go mod tidy

  db:up:
    desc: Start database
    cmds:
      - docker compose up -d

  db:down:
    desc: Stop database
    cmds:
      - docker compose down

  swag:
    desc: Generate OpenAPI spec from code annotations
    cmds:
      - swag init --parseDependency --parseInternal

  sqlc:
    desc: Generate sqlc code
    cmds:
      - sqlc generate

  db:migrate:
    desc: Run database migrations
    cmds:
      - goose -dir internal/db/migrations postgres "${DATABASE_URL:-postgres://necro:necro@localhost:5432/necro_prestige?sslmode=disable}" up

  db:rollback:
    desc: Rollback last database migration
    cmds:
      - goose -dir internal/db/migrations postgres "${DATABASE_URL:-postgres://necro:necro@localhost:5432/necro_prestige?sslmode=disable}" down

  tui:
    desc: Run the resource cap TUI
    cmds:
      - go run ./cmd/tui

  dev:
    desc: Run development server with hot reload
    cmds:
      - air

  docker:up:
    desc: Start all services in Docker
    cmds:
      - docker compose up -d

  docker:down:
    desc: Stop all services in Docker
    cmds:
      - docker compose down