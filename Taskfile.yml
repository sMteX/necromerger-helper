version: '3'

vars:
  TEMPLUI_PATH:
    sh: go list -m -f '{{.Dir}}' github.com/templui/templui

dotenv: ['.env']

tasks:
  setup:
    desc: Install necessary tools
    cmds:
      - go install github.com/a-h/templ/cmd/templ@latest
      - go install github.com/air-verse/air@latest
      - go mod tidy
      - curl -sLO https://github.com/tailwindlabs/tailwindcss/releases/latest/download/tailwindcss-linux-x64
      - chmod +x tailwindcss-linux-x64
      - mkdir -p .bin
      - mv tailwindcss-linux-x64 .bin/tailwindcss

  db:up:
    desc: Start database
    cmds:
      - docker compose up -d

  db:down:
    desc: Stop database
    cmds:
      - docker compose down

  templ:
    desc: Watch templ files
    cmds:
      - templ generate --watch --proxy="http://localhost:8080" --open-browser=false

  tailwind:
    desc: Watch tailwind css changes
    cmds:
      - echo '@source "../**/*.{templ,go}";' > src/styles/sources.css
      - echo '@source "{{.TEMPLUI_PATH}}/**/*.templ";' >> src/styles/sources.css
      - .bin/tailwindcss -i ./src/styles/input.css -o ./assets/css/output.css --watch

  sqlc:
    desc: Generate sqlc code
    cmds:
      - sqlc generate

  db:migrate:
    desc: Run database migrations
    cmds:
      - goose -dir internal/db/migrations postgres "${DATABASE_URL:-postgres://necro:necro@localhost:5432/necro_prestige?sslmode=disable}" up

  db:rollback:
    desc: Rollback last database migration
    cmds:
      - goose -dir internal/db/migrations postgres "${DATABASE_URL:-postgres://necro:necro@localhost:5432/necro_prestige?sslmode=disable}" down

  dev:
    desc: Run development server with hot reload
    cmds:
      - air
